# Server Configuration
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application Name
spring.application.name=notification-hub-api

# Actuator Configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# Default Profile
spring.profiles.active=dev

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-in-production-min-256-bits}
jwt.expiration=86400000

# Allowed CORS Origins
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Encryption Configuration
encryption.secret=${ENCRYPTION_SECRET:change-me-in-production-use-256-bit-key}

# H2 Console (disabled by default)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# HikariCP Connection Pool (defaults)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}

# Rate Limiting Configuration
rate.limit.enabled=${RATE_LIMIT_ENABLED:true}
rate.limit.capacity=${RATE_LIMIT_CAPACITY:100}
rate.limit.refill.tokens=${RATE_LIMIT_REFILL_TOKENS:100}
rate.limit.refill.minutes=${RATE_LIMIT_REFILL_MINUTES:1}
