# Production Profile - PostgreSQL
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      initialization-fail-timeout: -1
      keepalive-time: 60000
      leak-detection-threshold: 60000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      enabled: true
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Redis is required in production for distributed caching
# Set REDIS_HOST and REDIS_PORT environment variables before deploying
# Example: REDIS_HOST=your-redis-host REDIS_PORT=6379
#
# Cache TTLs (configured in CacheConfig.java):
# - templates: 30 minutes
# - preferences: 5 minutes
# - notifications: 10 minutes (default)

# Logging
logging:
  level:
    root: WARN
    com.notification.hub: INFO
    org.springframework.security: WARN
