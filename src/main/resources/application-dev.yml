# Development Profile - H2 In-Memory Database
spring:
  datasource:
    url: jdbc:h2:mem:notificationhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  flyway:
    enabled: false

# Redis disabled in dev (optional)
  data:
    redis:
      enabled: false
      host: localhost
      port: 6379

# Cache configuration
# Redis is disabled in development
# Templates and preferences use in-memory ConcurrentMapCache
# To enable Redis locally:
#   1. Run: docker run -p 6379:6379 redis:7-alpine
#   2. Set spring.data.redis.enabled=true

# Logging
logging:
  level:
    root: INFO
    com.notification.hub: DEBUG
    org.springframework.security: DEBUG
