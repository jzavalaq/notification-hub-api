# Development Profile - H2 In-Memory Database
spring:
  datasource:
    url: jdbc:h2:mem:notificationhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  flyway:
    enabled: false

# Redis disabled in dev (optional)
  data:
    redis:
      host: localhost
      port: 6379

# Logging
logging:
  level:
    root: INFO
    com.notificationhub: DEBUG
    org.springframework.security: DEBUG
